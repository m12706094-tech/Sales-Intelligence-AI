services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sales-intelligence-ai
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      NODE_ENV: production
    volumes:
      - sales_db_data:/app/data
    command: >
      sh -c "mkdir -p /app/data && ln -sf /app/data/sales.db /app/sales.db && npm run dev"
    restart: unless-stopped

volumes:
  sales_db_data:
